<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️日本咔哩咔哩/大片日本蝦餅❤️ 團購助手 V4.6</title>
    <style>
        :root { --main: #FF007F; --dark: #1a1a1a; --line: #00B900; --red: #ff4d4d; --bg: #FFF0F5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 140px; color: #333; overflow-x: hidden; }
        .header { background: #000; color: #fff; text-align: center; padding: 12px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .price-info { background: #fffde6; color: #444; text-align: center; padding: 10px; font-size: 14px; border-bottom: 2px solid #ddd; }
        .price-info b { color: var(--main); font-size: 16px; }
        .user-nav { background: #333; display: flex; overflow-x: auto; padding: 12px; gap: 10px; align-items: center; min-height: 65px; border-bottom: 2px solid #000; }
        .btn-add { background: #fff; color: #000; padding: 10px 18px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; flex-shrink: 0; cursor: pointer; }
        .user-tab { background: #555; color: #eee; padding: 10px 18px; border-radius: 25px; white-space: nowrap; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .user-tab.active { background: #fff; color: #000; font-weight: bold; }
        .cart-count { background: var(--main); color: #fff; border-radius: 50%; font-size: 11px; padding: 1px 6px; margin-left: -5px; }
        .del-u { color: var(--red); font-weight: bold; font-size: 18px; padding-left: 5px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.15); margin-bottom: 25px; }
        .card-img { width: 100%; height: auto; max-height: 250px; object-fit: contain; background: #fff; }
        .card-body { padding: 20px; }
        .section-h { font-weight: bold; margin: 18px 0 10px; display: block; font-size: 16px; color: #444; border-left: 5px solid #000; padding-left: 10px; }
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: 1.5px solid #f0f0f0; border-radius: 12px; background: #fafafa; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
        .opt-row.active { border-color: #000; background: #fffde6; }
        .opt-name { flex: 1; font-size: 15px; }
        .qty-controls { display: flex; align-items: center; gap: 4px; visibility: hidden; margin-left: 5px; }
        .opt-row.active .qty-controls { visibility: visible; }
        .qty-btn { background: #eee; color: #000; border: none; border-radius: 5px; font-weight: bold; width: 30px; height: 30px; font-size: 18px; cursor: pointer; }
        .qty-input { width: 40px; height: 30px; text-align: center; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; font-weight: bold; }
        .btn-quick-add { background: var(--main); color: white; border: none; border-radius: 5px; width: 35px; height: 30px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .input-box { width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; margin-top: 5px; }
        .order-item { background: #fff; margin-top: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -8px 25px rgba(0,0,0,0.1); z-index: 100; }
        .price-num { font-size: 32px; font-weight: 900; color: #d00; }
        .btn-line { background: var(--line); color: #fff; padding: 15px 30px; border-radius: 15px; font-weight: bold; text-decoration: none; font-size: 17px; border:none; cursor:pointer; }
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 85%; max-width: 350px; padding: 30px 20px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="header">❤️日本咔哩咔哩/大片日本蝦餅❤️</div>
<div class="price-info">💰<b>1包80元</b> / 💰<b>2包150元</b> / 💰<b>3包200元</b></div>

<div class="user-nav" id="tabs"></div>

<div class="container">
    <div id="welcome" style="text-align:center; padding: 60px 20px;">
        <div style="font-size: 70px;">❤️</div>
        <h2>歡迎團購</h2>
        <p>請點擊上方人員開始點餐</p>
    </div>

    <div id="order-ui" style="display:none">
        <div class="card">
            <img src="https://i.postimg.cc/vDRZq4L0/IMG-9147.png" class="card-img">
            <div class="card-body">
                <h2 id="cur-u-name" style="margin:0"></h2>
                
                <span class="section-h">1. 咔哩咔哩口味</span>
                <div class="items-list" id="list-kali"></div>

                <span class="section-h">2. 大片日本蝦餅口味</span>
                <div class="items-list" id="list-shrimp"></div>

                <span class="section-h">3. 全域備註 (選填)</span>
                <input type="text" id="note-in" class="input-box" placeholder="備註會隨品項加入...">
            </div>
        </div>
        <div id="items-box"></div>
    </div>
</div>

<div class="footer">
    <div>總包數：<span id="t-qty" style="color:var(--main);font-weight:bold;">0</span> 包<br><div class="price-num" id="total">$0</div></div>
    <button class="btn-line" onclick="goLine()">匯出 LINE</button>
</div>

<div class="modal-bg" id="modal">
    <div class="modal-content">
        <h3>新增姓名</h3>
        <input type="text" id="name-in" class="input-box" style="text-align:center">
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button onclick="showM(false)" style="flex:1;padding:15px;border:none;border-radius:10px;">取消</button>
            <button onclick="addU()" style="flex:1;padding:15px;border:none;border-radius:10px;background:var(--main);color:#fff;">確定</button>
        </div>
    </div>
</div>

<script>
    let users=[], cur=-1;
    const kali = ["1. 無調味","2. 原味（糖粉）","3. 梅子","4. 甜海苔","5. 鹹海苔","6. 胡椒","7. 芥末","8. 蒜味","9. 辣味","10. 海苔辣味"];
    const shrimp = ["1. 原味 (無調味)","2. 梅子","3. 海苔","4. 胡椒","5. 芥末","6. 辣味","7. 蒜味","8. ㊙️白魚片㊙️ (限量)"];
    const defaults=["主任","嘉綾","Dora","怡如","晶晶","Wendy","婷婷","佳佳","瑄瑄","小天使"];
    defaults.forEach(n=>users.push({name:n, orders:[]}));

    function initMenu() {
        const renderList = (arr, targetId, type) => {
            let h = '';
            arr.forEach(f => {
                h += `<div class="opt-row i-opt" data-ty="${type}" data-name="${f}" onclick="setI(this)">
                    <span class="opt-name">${f}</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="adj(this,-1)">-</button>
                        <input type="number" class="qty-input" value="1" onclick="event.stopPropagation()">
                        <button class="qty-btn" onclick="adj(this,1)">+</button>
                        <button class="btn-quick-add" onclick="quickAdd(this)">✓</button>
                    </div>
                </div>`;
            });
            document.getElementById(targetId).innerHTML = h;
        };
        renderList(kali, 'list-kali', '卡哩卡哩');
        renderList(shrimp, 'list-shrimp', '大片蝦餅');
    }

    function showM(s){ document.getElementById('modal').style.display=s?'flex':'none'; }
    function addU(){ let n=document.getElementById('name-in').value.trim(); if(n){users.push({name:n,orders:[]}); cur=users.length-1; showM(false); render();}}
    function setI(el){ document.querySelectorAll('.i-opt').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
    function adj(btn,d){ event.stopPropagation(); let input=btn.parentNode.querySelector('.qty-input'); let v=(parseInt(input.value) || 0)+d; if(v<1)v=1; input.value=v; }

    function quickAdd(btn) {
        event.stopPropagation();
        if(cur < 0) return;
        let row = btn.closest('.i-opt');
        let q = parseInt(row.querySelector('.qty-input').value) || 1;
        users[cur].orders.push({ t:row.dataset.ty, f:row.dataset.name, q:q, n:document.getElementById('note-in').value.trim() });
        row.querySelector('.qty-input').value = 1;
        document.getElementById('note-in').value = '';
        render();
    }

    function calc(c){ return Math.floor(c/3)*200 + Math.floor((c%3)/2)*150 + ((c%3)%2)*80; }

    function render(){
        let th='<button class="btn-add" onclick="showM(true)">+ 新增</button>', gQ=0;
        users.forEach((u,i)=>{ 
            let uQ=u.orders.reduce((s,o)=>s+o.q,0); gQ+=uQ; 
            th+=`<div class="user-tab ${i===cur?'active':''}" onclick="cur=${i};render()">
                <span>${u.name}</span>${uQ>0?`<span class="cart-count">${uQ}</span>`:''}<span class="del-u" onclick="event.stopPropagation();users.splice(${i},1);render()">×</span>
            </div>`;
        });
        document.getElementById('tabs').innerHTML=th;
        if(cur>=0){
            document.getElementById('welcome').style.display='none'; document.getElementById('order-ui').style.display='block';
            document.getElementById('cur-u-name').innerText=`👤 ${users[cur].name}`;
            let oh=''; users[cur].orders.forEach((o,oi)=>oh+=`<div class="order-item"><div><b>${o.f}</b> $${80*o.q}<br><small>(${o.q}包)${o.n?' 📝'+o.n:''}</small></div><button onclick="users[${cur}].orders.splice(${oi},1);render()" style="color:var(--red);border:1px solid;padding:5px;border-radius:5px;background:none;">刪除</button></div>`);
            document.getElementById('items-box').innerHTML=oh || '<p style="text-align:center;color:#aaa">目前清單為空</p>';
        }
        document.getElementById('total').innerText=`$${calc(gQ)}`; document.getElementById('t-qty').innerText=gQ;
    }

    function goLine(){
        if(!users.some(u=>u.orders.length)) return alert("沒人點餐喔");
        
        let m="【❤️咔哩咔哩/蝦餅❤️ 團購報表】\n\n", gQ=0;
        let summary = {}; // 用於存放店家彙總

        // 1. 個人名單與彙總邏輯
        users.forEach(u=>{ 
            if(u.orders.length){ 
                let uQ=u.orders.reduce((s,o)=>s+o.q,0); 
                gQ+=uQ; 
                m+=`👤 [${u.name}]\n`; 
                u.orders.forEach(o=>{
                    m+=`▫️ ${o.f} x ${o.q}包${o.n?'('+o.n+')':''}\n`;
                    // 彙總計算
                    let key = `[${o.t}] ${o.f}`;
                    summary[key] = (summary[key] || 0) + o.q;
                }); 
                m+=`💰 小計：$${calc(uQ)}\n\n`; 
            }
        });

        // 2. 插入店家彙總清單
        m+=`==================\n🏠 【店家彙總清單】\n`;
        Object.keys(summary).sort().forEach(item => {
            m+=`📦 ${item}：${summary[item]} 包\n`;
        });

        // 3. 總計
        m+=`==================\n🏠 總包數：${gQ} 包\n💰 總金額：$${calc(gQ)} 元`;
        
        window.location.href="https://line.me/R/msg/text/?"+encodeURIComponent(m);
    }
    
    initMenu();
    render();
</script>
</body>
</html>
