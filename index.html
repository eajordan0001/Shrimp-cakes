<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️日本咔哩咔哩/大片日本蝦餅❤️ 團購助手 V4.2</title>
    <style>
        :root { --main: #FF007F; --dark: #1a1a1a; --line: #00B900; --red: #ff4d4d; --bg: #FFF0F5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "Noto Sans TC", sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 140px; color: #333; overflow-x: hidden; }
        .header { background: #000; color: #fff; text-align: center; padding: 15px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .price-info { background: #fffde6; color: #444; text-align: center; padding: 12px; font-size: 14px; border-bottom: 2px solid #ddd; }
        .price-info b { color: var(--main); font-size: 16px; }
        .user-nav { background: #333; display: flex; overflow-x: auto; padding: 12px; gap: 10px; align-items: center; min-height: 65px; border-bottom: 2px solid #000; }
        .btn-add { background: #fff; color: #000; padding: 10px 18px; border-radius: 25px; font-weight: bold; font-size: 14px; border: none; flex-shrink: 0; cursor: pointer; }
        .user-tab { background: #555; color: #eee; padding: 10px 18px; border-radius: 25px; white-space: nowrap; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .user-tab.active { background: #fff; color: #000; font-weight: bold; }
        .cart-count { background: var(--main); color: #fff; border-radius: 50%; font-size: 11px; padding: 1px 6px; margin-left: -5px; }
        .del-u { color: var(--red); font-weight: bold; font-size: 18px; padding-left: 5px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.15); margin-bottom: 25px; }
        /* 使用您提供的新圖片網址 */
        .card-img { width: 100%; height: 220px; object-fit: cover; background: #eee; border-bottom: 4px solid #000; }
        .card-body { padding: 20px; }
        .section-h { font-weight: bold; margin: 18px 0 10px; display: block; font-size: 16px; color: #444; border-left: 5px solid #000; padding-left: 10px; }
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border: 1.5px solid #f0f0f0; border-radius: 12px; background: #fafafa; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .opt-row.active { border-color: #000; background: #fffde6; }
        .qty-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .qty-btn { background: #eee; color: #000; border: none; border-radius: 5px; font-weight: bold; width: 28px; height: 28px; visibility: hidden; }
        .qty-num { font-size: 16px; color: #000; visibility: hidden; font-weight: bold; width: 20px; text-align: center; }
        .opt-row.active .qty-btn, .opt-row.active .qty-num { visibility: visible; }
        .input-box { width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; margin-top: 5px; }
        .btn-submit { width: 100%; background: var(--main); color: #fff; padding: 18px; border-radius: 18px; font-weight: bold; font-size: 18px; border: none; margin-top: 25px; }
        .order-item { background: #fff; margin-top: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -8px 25px rgba(0,0,0,0.1); }
        .price-num { font-size: 32px; font-weight: 900; color: #d00; }
        .btn-line { background: var(--line); color: #fff; padding: 15px 30px; border-radius: 15px; font-weight: bold; text-decoration: none; font-size: 17px; }
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 85%; max-width: 350px; padding: 30px 20px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="header">❤️日本咔哩咔哩/大片日本蝦餅❤️</div>
<div class="price-info">💰<b>1包80元</b> / 💰<b>2包150元</b> / 💰<b>3包200元</b></div>

<div class="user-nav" id="tabs"><button class="btn-add" onclick="showM(true)">+ 新增</button></div>

<div class="container">
    <div id="welcome" style="text-align:center; padding: 80px 20px;">
        <div style="font-size: 70px;">❤️</div>
        <h2>歡迎團購</h2>
        <p>請先點擊上方預設人員開始點餐</p>
    </div>

    <div id="order-ui" style="display:none">
        <div class="card">
            <img src="https://i.postimg.cc/vDRZq4L0/IMG-9147.png" class="card-img">
            <div class="card-body">
                <h2 id="cur-u-name"></h2>
                
                <span class="section-h">1. 品項與口味 (每包80元，買多有折)</span>
                <div class="items-list">
                    <div class="opt-row i-opt active" data-ty="卡哩卡哩" onclick="setI(this)"><span class="opt-name">1. 無調味</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                    <div class="opt-row i-opt" data-ty="卡哩卡哩" onclick="setI(this)"><span class="opt-name">2. 原味（糖粉）</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                    <div class="opt-row i-opt" data-ty="卡哩卡哩" onclick="setI(this)"><span class="opt-name">3. 梅子</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                    <div class="opt-row i-opt" data-ty="大片蝦餅" onclick="setI(this)"><span class="opt-name">大片蝦餅-原味</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                    <div class="opt-row i-opt" data-ty="大片蝦餅" onclick="setI(this)"><span class="opt-name">大片蝦餅-梅子</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                    <div class="opt-row i-opt" data-ty="大片蝦餅" onclick="setI(this)"><span class="opt-name">㊙️白魚片㊙️</span><div class="qty-controls"><button class="qty-btn" onclick="adj(this,-1)">-</button><span class="qty-num">1</span><button class="qty-btn" onclick="adj(this,1)">+</button></div></div>
                </div>

                <span class="section-h">2. 備註 (選填)</span>
                <input type="text" id="note-in" class="input-box" placeholder="選填：例如不要梅粉...">
                <button class="btn-submit" onclick="addO()">確認加入清單</button>
            </div>
        </div>
        <div id="items-box"></div>
    </div>
</div>

<div class="footer">
    <div class="total-box">總包數：<span id="t-qty">0</span> 包<br><div class="price-num" id="total">$0</div></div>
    <a href="#" class="btn-line" onclick="goLine()">匯出 LINE</a>
</div>

<div class="modal-bg" id="modal">
    <div class="modal-content">
        <h3>新增採購人員</h3>
        <input type="text" id="name-in" class="input-box" style="text-align:center">
        <div style="display:flex;gap:10px;margin-top:20px;"><button onclick="showM(false)" style="flex:1;padding:15px;border-radius:10px;border:none">取消</button><button onclick="addU()" style="flex:1;padding:15px;border-radius:10px;border:none;background:var(--main);color:#fff">確定</button></div>
    </div>
</div>

<script>
    let users=[], cur=-1, t="卡哩卡哩", f="1. 無調味", qty=1;
    const defaults=["主任","嘉綾","Dora","怡如","晶晶","Wendy","婷婷","佳佳","瑄瑄","小天使"];
    defaults.forEach(n=>users.push({name:n, orders:[]}));

    function showM(s){ document.getElementById('modal').style.display=s?'flex':'none'; if(s){document.getElementById('name-in').value=''; setTimeout(()=>document.getElementById('name-in').focus(),200);}}
    function addU(){ let n=document.getElementById('name-in').value.trim(); if(n){users.push({name:n,orders:[]}); cur=users.length-1; showM(false); render();}}
    function setI(el){ document.querySelectorAll('.i-opt').forEach(b=>b.classList.remove('active')); el.classList.add('active'); t=el.dataset.ty; f=el.querySelector('.opt-name').innerText; qty=parseInt(el.querySelector('.qty-num').innerText);}
    function adj(btn,d){ event.stopPropagation(); let n=btn.parentNode.querySelector('.qty-num'); let v=parseInt(n.innerText)+d; if(v<1)v=1; n.innerText=v; if(btn.closest('.i-opt').classList.contains('active')) qty=v;}
    function addO(){ if(cur<0)return; users[cur].orders.push({t,f,q:qty,n:document.getElementById('note-in').value.trim()}); document.getElementById('note-in').value=''; render();}
    function calc(c){ return Math.floor(c/3)*200 + Math.floor((c%3)/2)*150 + ((c%3)%2)*80; }

    function render(){
        let th='<button class="btn-add" onclick="showM(true)">+ 新增</button>', gQ=0;
        users.forEach((u,i)=>{ let uQ=u.orders.reduce((s,o)=>s+o.q,0); gQ+=uQ; th+=`<div class="user-tab ${i===cur?'active':''}" onclick="cur=${i};render()"><span>${u.name}</span>${uQ>0?`<span class="cart-count">${uQ}</span>`:''}<span class="del-u" onclick="event.stopPropagation();users.splice(${i},1);cur=(cur==${i}?-1:cur);render()">×</span></div>`;});
        document.getElementById('tabs').innerHTML=th;
        if(cur>=0){
            document.getElementById('welcome').style.display='none'; document.getElementById('order-ui').style.display='block';
            document.getElementById('cur-u-name').innerText=`👤 ${users[cur].name}`;
            let oh=''; users[cur].orders.forEach((o,oi)=>oh+=`<div class="order-item"><div><b>${o.f}</b> $${80*o.q}<br><small>(${o.q}包)${o.n?' 📝'+o.n:''}</small></div><button class="btn-del-o" onclick="users[${cur}].orders.splice(${oi},1);render()">刪除</button></div>`);
            document.getElementById('items-box').innerHTML=oh || '<p style="color:#aaa;text-align:center;padding:20px;">清單為空</p>';
        }
        document.getElementById('total').innerText=`$${calc(gQ)}`; document.getElementById('t-qty').innerText=gQ;
    }

    function goLine(){
        if(!users.some(u=>u.orders.length)) return alert("沒人點餐喔！");
        let m="【❤️日本咔哩咔哩/蝦餅❤️ 團購明細】\n", gQ=0;
        users.forEach(u=>{ if(u.orders.length){ let uQ=u.orders.reduce((s,o)=>s+o.q,0); gQ+=uQ; m+=`👤 [${u.name}]\n`; u.orders.forEach(o=>m+=`▫️ ${o.f} x ${o.q}包${o.n?' ('+o.n+')':''}\n`); m+=`💰 個人合計：$${calc(uQ)} (${uQ}包)\n\n`; }});
        m+=`==================\n🏠 店家總計：${gQ} 包\n💰 團購總額：$${calc(gQ)}元`;
        window.location.href="https://line.me/R/msg/text/?"+encodeURIComponent(m);
    }
    render();
</script>
</body>
</html>
